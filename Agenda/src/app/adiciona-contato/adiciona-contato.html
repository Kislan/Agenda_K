<div class="container">

  <h1 class="text-center">Adicionar Contato</h1>

  <form [formGroup]="formContato">

    <div class="mb-3">
      <label class="form-label">Nome</label>
      <input
        type="text"
        class="form-control"
        formControlName="nome">
    </div>

    <div class="mb-3">
      <label class="form-label">Telefone</label>
      <input
        type="text"
        class="form-control"
        formControlName="telefone">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        formControlName="email">
    </div>

    <div class="mb-3">
      <label class="form-label">Aniversário</label>
      <input
        type="date"
        class="form-control"
        formControlName="aniversario">
    </div>

    <div class="mb-3">
      <label class="form-label">Tipo de Contato</label>

      <select
        class="form-control"
        formControlName="tipo">

        <option value="">Selecione</option>

        @for (tipo of tipos; track tipo) {
          <option [value]="tipo">
            {{ tipo }}
          </option>
        }

      </select>
    </div>

    <div class="mb-3">
      <input
        type="button"
        class="btn btn-primary d-block mx-auto"
        value="Adicionar Contato"
        (click)="cadastrarContato()"
        [disabled]="formContato.invalid">
    </div>

  </form>

  @if (contatos.length > 0) {

    <h3 class="mt-4">Contatos Cadastrados</h3>

    <table class="table table-striped table-bordered">

      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Aniversário</th>
          <th>Tipo</th>
        </tr>
      </thead>

      <tbody>

        @for (contato of contatos; track contato) {

          <tr>
            <td>{{ contato.getNome() }}</td>
            <td>{{ contato.getTelefone() }}</td>
            <td>{{ contato.getEmail() }}</td>
            <td>{{ contato.getAniversario() }}</td>
            <td>{{ contato.getTipo() }}</td>
          </tr>

        }

      </tbody>

    </table>

  }

</div>
