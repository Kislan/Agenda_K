<section class="contato-form">
	<h2>Cadastro de Contato</h2>

	<form [formGroup]="contatoForm">
		<div>
			<label>Nome</label>
			<input formControlName="nome" />
		</div>

		<div>
			<label>Telefone</label>
			<input formControlName="telefone" />
		</div>

		<div>
			<label>Email</label>
			<input formControlName="email" />
		</div>

		<div>
			<label>Aniversário</label>
			<input type="date" formControlName="aniversario" />
		</div>

		<div>
			<label>Tipo</label>
			<select formControlName="tipo">
				<option *ngFor="let t of tipos" [value]="t">{{ t }}</option>
			</select>
		</div>

		<button type="button" (click)="adicionarContato()">Adicionar</button>
	</form>
</section>
